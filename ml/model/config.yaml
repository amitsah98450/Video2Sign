# =============================================================
# TPS Motion Model — Configuration
# Hyperparameters for the Thin-Plate Spline Motion Model
# Based on VoxCeleb-256 config from the official implementation
# =============================================================

dataset_params:
  root_dir: data/videos
  frame_shape: [256, 256]
  id_sampling: true
  augmentation_params:
    flip_param:
      horizontal_flip: true
      time_flip: true
    jitter_param:
      brightness: 0.1
      contrast: 0.1
      saturation: 0.1
      hue: 0.1

model_params:
  common_params:
    num_tps: 10          # Number of TPS transformations
    num_channels: 3      # RGB
    bg: true             # Background motion estimation
    multi_mask: true     # Multi-resolution occlusion masks

  generator_params:
    block_expansion: 64
    max_features: 512
    num_down_blocks: 3

  dense_motion_params:
    block_expansion: 64
    max_features: 1024
    num_blocks: 5
    scale_factor: 0.25

  avd_network_params:
    id_bottle_size: 128
    pose_bottle_size: 128

train_params:
  num_epochs: 100
  num_repeats: 75       # Pairs per video per epoch
  epoch_milestones: [70, 90]  # LR decay points
  lr_generator: 2.0e-4
  batch_size: 16        # Adjusted for typical GPU memory
  scales: [1, 0.5, 0.25, 0.125]  # Multi-scale loss
  dataloader_workers: 4
  checkpoint_freq: 10
  
  # TPS Dropout Schedule (Eq. 7-8 in paper)
  dropout_epoch: 35     # Start dropout at this epoch
  dropout_maxp: 0.3
  dropout_startp: 0.1
  dropout_inc_epoch: 10
  
  # Background loss starts at this epoch
  bg_start: 10
  
  # Random TPS for equivariance loss
  transform_params:
    sigma_affine: 0.05
    sigma_tps: 0.005
    points_tps: 5

  loss_weights:
    perceptual: [10, 10, 10, 10, 10]
    equivariance_value: 10
    warp_loss: 10
    bg: 10

# AVD Network training (second stage)
train_avd_params:
  num_epochs: 200
  num_repeats: 300
  batch_size: 256
  dataloader_workers: 4
  checkpoint_freq: 50
  epoch_milestones: [140, 180]
  lr: 1.0e-3
  lambda_shift: 1
  random_scale: 0.25

visualizer_params:
  kp_size: 5
  draw_border: true
  colormap: gist_rainbow
